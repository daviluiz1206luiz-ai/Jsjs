<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleição para Líder</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#4b2c83,#d12b6a);
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
}

#ranking{
    background: gold;
    color:black;
    padding:15px;
    border-radius:20px;
    width:85%;
    margin:20px auto;
    font-weight:bold;
}

#cadastroTela{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#cadastroBox{
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
    width:85%;
    max-width:350px;
}

#cadastroBox input{
    width:100%;
    padding:8px;
    margin-top:10px;
}

#cadastroBox button{
    margin-top:15px;
    padding:8px;
    width:100%;
}

#painel{
    position:fixed;
    bottom:0;
    width:100%;
    height:60%;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius:25px 25px 0 0;
    display:flex;
    flex-direction:column;
}

#barra{
    width:60px;
    height:6px;
    background:white;
    border-radius:10px;
    margin:10px auto;
}

#lista{
    overflow-y:auto;
    flex:1;
    padding-bottom:20px;
}

.candidato{
    background:rgba(255,255,255,0.15);
    margin:10px;
    padding:15px;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
}

.ativo{
    border:3px solid gold;
}
</style>
</head>
<body>

<h1>🏆 Eleição para Líder</h1>
<div id="ranking">Nenhum candidato cadastrado</div>

<div id="cadastroTela">
    <div id="cadastroBox">
        <h3>Cadastro de Candidato</h3>
        <p style="font-size:13px">
        Se você não colocar nome, você pode entrar normalmente,
        mas seu nome não aparecerá na lista. Você apenas poderá votar.
        </p>
        <input type="text" id="nomeCadastro" placeholder="Digite seu nome">
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<div id="painel">
    <div id="barra"></div>
    <div id="lista"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwwpG6G8zwcAGnUsI-CWk274XSgIYKt1k",
  authDomain: "site1-6d372.firebaseapp.com",
  databaseURL: "https://site1-6d372-default-rtdb.firebaseio.com",
  projectId: "site1-6d372",
  storageBucket: "site1-6d372.firebasestorage.app",
  messagingSenderId: "426285655102",
  appId: "1:426285655102:web:d388e18ec9eda092a5dd6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let votoAtual = null;

function gerarCodigo(){
    return Math.random().toString(36).substring(2,8).toUpperCase();
}

function entrar(){
    let nome = document.getElementById("nomeCadastro").value.trim();

    if(nome === ""){
        document.getElementById("cadastroTela").style.display="none";
        return;
    }

    db.ref("candidatos").once("value", snapshot=>{
        let nomeExiste = false;

        snapshot.forEach(child=>{
            if(child.val().nome.toLowerCase() === nome.toLowerCase()){
                nomeExiste = true;
            }
        });

        if(nomeExiste){
            alert("Esse nome já está cadastrado!");
            return;
        }

        db.ref("candidatos").push({
            nome:nome,
            votos:0,
            codigo:gerarCodigo()
        });

        document.getElementById("cadastroTela").style.display="none";
    });
}

function votar(id){

    if(votoAtual !== null){
        db.ref("candidatos/"+votoAtual+"/votos").once("value", snap=>{
            db.ref("candidatos/"+votoAtual+"/votos").set(snap.val()-1);
        });
    }

    votoAtual = id;

    db.ref("candidatos/"+id+"/votos").once("value", snap=>{
        db.ref("candidatos/"+id+"/votos").set(snap.val()+1);
    });
}

db.ref("candidatos").on("value", snapshot=>{
    let lista = document.getElementById("lista");
    lista.innerHTML="";
    let candidatos = [];

    snapshot.forEach(child=>{
        candidatos.push({
            id:child.key,
            ...child.val()
        });
    });

    candidatos.forEach(c=>{
        lista.innerHTML += `
            <div class="candidato ${votoAtual===c.id?'ativo':''}" onclick="votar('${c.id}')">
                <strong>${c.nome}</strong><br>
                ${c.votos} votos<br>
                Código: ${c.codigo}
            </div>
        `;
    });

    if(candidatos.length > 0){
        let ordenado = [...candidatos].sort((a,b)=>b.votos-a.votos);
        document.getElementById("ranking").innerHTML =
            `1º - ${ordenado[0].nome} = ${ordenado[0].votos} votos`;
    } else {
        document.getElementById("ranking").innerHTML = "Nenhum candidato cadastrado";
    }
});
</script>

</body>
</html>
