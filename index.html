<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LiderClubex</title>
<script type="module">

// IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// SUA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBi6IaFAr5HuN92QQ5NLQ2RwhKRGMR2vIQ",
  authDomain: "site-a530a.firebaseapp.com",
  databaseURL: "https://site-a530a-default-rtdb.firebaseio.com",
  projectId: "site-a530a",
  storageBucket: "site-a530a.firebasestorage.app",
  messagingSenderId: "789277580820",
  appId: "1:789277580820:web:3c53fd75b2b64372699101",
  measurementId: "G-CWPZ1NR51R"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let meuVoto = null;

// CADASTRAR
window.cadastrar = async function() {
  const nome = document.getElementById("nome").value.trim();
  if(nome === ""){
    document.getElementById("cadastro").style.display="none";
    document.getElementById("votacao").style.display="block";
    return;
  }

  const candidatosRef = ref(db,"candidatos");
  const snapshot = await get(candidatosRef);

  let nomeExiste = false;
  snapshot.forEach(child=>{
    if(child.val().nome.toLowerCase() === nome.toLowerCase()){
      nomeExiste = true;
    }
  });

  if(nomeExiste){
    alert("Esse nome já existe!");
    return;
  }

  push(candidatosRef,{
    nome:nome,
    votos:0
  });

  document.getElementById("cadastro").style.display="none";
  document.getElementById("votacao").style.display="block";
}

// LISTA EM TEMPO REAL
const lista = document.getElementById("lista");
onValue(ref(db,"candidatos"), snapshot=>{
  lista.innerHTML="";
  snapshot.forEach(child=>{
    const data = child.val();
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = data.nome + " - Votos: " + data.votos;

    div.onclick = ()=>{
      if(meuVoto === child.key) return;

      if(meuVoto){
        const oldRef = ref(db,"candidatos/"+meuVoto+"/votos");
        get(oldRef).then(snap=>{
          set(oldRef, snap.val()-1);
        });
      }

      const newRef = ref(db,"candidatos/"+child.key+"/votos");
      get(newRef).then(snap=>{
        set(newRef, snap.val()+1);
      });

      meuVoto = child.key;
    };

    lista.appendChild(div);
  });
});

</script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

input{
  padding:10px;
  margin:10px;
}

button{
  padding:10px;
  cursor:pointer;
}

#lista{
  max-height:300px;
  overflow-y:auto;
  border-top:3px solid white;
}

.card{
  padding:15px;
  border-bottom:1px solid white;
  cursor:pointer;
}
.card:hover{
  background:#222;
}
</style>
</head>

<body>

<div id="cadastro">
<h2>Cadastro</h2>
<p>Se você não colocar nome, poderá entrar, mas não aparecerá como candidato. Só poderá votar.</p>
<input id="nome" placeholder="Seu nome">
<br>
<button onclick="cadastrar()">Entrar</button>
</div>

<div id="votacao" style="display:none;">
<h2>Votação</h2>
<div id="lista"></div>
</div>

</body>
